version: '3.8'
services:
  db:
    image: mysql:latest
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: webacademy
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - app_network
  backend:
    build: ./backend
    container_name: backend_app
    restart: always
    ports:
      - "4444:4444"
    env_file:
      - ./backend/.env
    environment:
      LOG_CONFIG: '{"level":"info"}'
    depends_on:
      - db
    volumes:
      - ./backend/log:/app/log
    networks:
      - app_network
  frontend:
    build: ./frontend
    container_name: frontend_app
    restart: always
    ports:
      - "8000:80"
    depends_on:
      - backend
    networks:
      - app_network
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root123
    depends_on:
      - db
    networks:
      - app_network
networks:
  app_network:
    driver: bridge
volumes:
  db_data: